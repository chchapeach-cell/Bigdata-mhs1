    <path d="M10,15 L10,25 C10,35 90,35 90,25 L90,15" fill="#A0E7E5" stroke="#33272A" stroke-width="8" stroke-linejoin="round"/>
  </g>
  
  <!-- Connectors and Nodes -->
  <path d="M 280 215 L 360 215 M 280 295 L 360 295 M 280 215 L 280 295" stroke="#33272A" stroke-width="20" stroke-linecap="round" />
  <circle cx="360" cy="215" r="30" fill="#FF8BA7" stroke="#33272A" stroke-width="15" />
  <circle cx="360" cy="295" r="30" fill="#A0E7E5" stroke="#33272A" stroke-width="15" />
</svg>
