<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="120" fill="#A0E7E5" stroke="#33272A" stroke-width="24"/>
  <rect x="50" y="50" width="412" height="412" rx="80" fill="#FFF9F5" stroke="#33272A" stroke-width="16"/>
  
  <!-- Database Stack (Big Data Theme) -->
  <g transform="translate(66, 66) scale(3.8)">
    <!-- Bottom Disk -->
    <path d="M10,65 C10,55 90,55 90,65 C90,75 10,75 10,65 Z" fill="#FF8BA7" stroke="#33272A" stroke-width="8" stroke-linejoin="round"/>
    <path d="M10,65 L10,75 C10,85 90,85 90,75 L90,65" fill="#FF8BA7" stroke="#33272A" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Middle Disk -->
    <path d="M10,40 C10,30 90,30 90,40 C90,50 10,50 10,40 Z" fill="#FFD3B6" stroke="#33272A" stroke-width="8" stroke-linejoin="round"/>
    <path d="M10,40 L10,50 C10,60 90,60 90,50 L90,40" fill="#FFD3B6" stroke="#33272A" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Top Disk -->
